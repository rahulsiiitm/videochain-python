[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "videochain"
version = "0.1.0"
description = "A Lightweight Video RAG Framework for Multimodal Reasoning"
readme = "README.md"
authors = [{ name = "Rahul Sharma", email = "rahulsharma.hps@gmail.com" }]
dependencies = [
    "opencv-python",
    "scenedetect",
    "openai-whisper",
    "sentence-transformers",
    "faiss-cpu",
    "google-generativeai",
    "moviepy"
]

[project.urls]
"Homepage" = "https://github.com/rahulsiiitm/videochain"